<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buying a Quantum token QTM</title>
    <!-- Надежное подключение Ethers.js v6 через cdnjs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.15.0/ethers.umd.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121214;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .pay-card {
            background-color: #1a1a1e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid #2a2a30;
        }
        h2 { margin-top: 0; color: #f3f3f3; }
        .info { color: #aaa; font-size: 14px; margin-bottom: 20px; word-break: break-all; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #ccc; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #3a3a42;
            background-color: #0a0a0c;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus { border-color: #f6851b; outline: none; }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background-color: #f6851b; 
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #e27613; }
        button:disabled { background-color: #4a4a52; cursor: not-allowed; }
        .status { margin-top: 15px; font-size: 14px; color: #ffeb3b; }
    </style>
</head>
<body>

<div class="pay-card">
    <h2>Purchasing tokens QTM</h2>
    <p class="info">Destination wallet :<br><strong id="receiver-address">Loading...</strong></p>
    
    <div class="input-group">
        <label for="eth-amount">Amount to be paid (ETH):</label>
        <input type="number" id="eth-amount" step="0.0001" min="0.0001" placeholder="Example, 0.005" value="0.005">
    </div>

    <button id="pay-btn" onclick="startPayment()">Buy tokens</button>
    <div id="status-text" class="status"></div>
</div>

    <script>
    // ВАШИ ТОЧНЫЕ НАСТРОЙКИ ДЛЯ ARBITRUM SEPOLIA TESTNET
    const ARBITRUM_CHAIN_ID_HEX = '0x66eee'; // 421614 в формате HEX
    const CROWDSALE_ADDRESS = "0xE57Edc0F47234C287A3973E4450B0e890E97f129"; // Ваш контракт краудсейла
    
    // ABI функции buyTokens(address)
    const contractABI = [
        "function buyTokens(address _receiver) public payable"
    ];

    // Извлекаем игровой кошелек (?receiver=0x...)
    const urlParams = new URLSearchParams(window.location.search);
    const gameReceiver = urlParams.get('receiver'); 

    if (gameReceiver) {
        document.getElementById('receiver-address').innerText = gameReceiver;
    } else {
        document.getElementById('receiver-address').innerText = "Ошибка: адрес игры не передан";
        document.getElementById('pay-btn').disabled = true;
    }

    async function startPayment() {
        const statusDiv = document.getElementById('status-text');
        const payBtn = document.getElementById('pay-btn');
        const ethAmountInput = document.getElementById('eth-amount').value;

        // ЗАЩИТА: Проверяем, загрузилась ли библиотека Ethers из cdnjs
        if (typeof ethers === 'undefined') {
            statusDiv.style.color = "#ff5722";
            statusDiv.innerText = "Ошибка: библиотека Ethers не загрузилась. Попробуйте обновить страницу.";
            return;
        }

        if (!ethAmountInput || parseFloat(ethAmountInput) <= 0) {
            statusDiv.innerText = "Пожалуйста, введите корректную сумму ETH.";
            return;
        }

        if (typeof window.ethereum === 'undefined') {
            statusDiv.innerText = "Пожалуйста, откройте эту страницу через браузер MetaMask.";
            return;
        }

        try {
            payBtn.disabled = true;
            statusDiv.style.color = "#ffeb3b";
            statusDiv.innerText = "Подключение к кошельку...";

            // 1. Подключаем аккаунт
            await window.ethereum.request({ method: 'eth_requestAccounts' });
            
            statusDiv.innerText = "Проверка тестовой сети Arbitrum...";

            // 2. Меняем или добавляем сеть Arbitrum Sepolia с вашим RPC и Blockscout
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: ARBITRUM_CHAIN_ID_HEX }],
                });
            } catch (switchError) {
                if (switchError.code === 4902) {
                    statusDiv.innerText = "Добавление сети Arbitrum Sepolia в MetaMask...";
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: ARBITRUM_CHAIN_ID_HEX,
                            chainName: 'Arbitrum Sepolia Testnet',
                            nativeCurrency: { name: 'Sepolia Ether', symbol: 'ETH', decimals: 18 },
                            rpcUrls: ['https://drpc.org'],
                            blockExplorerUrls: ['https://blockscout.com']
                        }],
                    });
                } else {
                    throw switchError;
                }
            }

            statusDiv.innerText = "Подготовка транзакции...";

            // 3. Инициализируем контракт через Ethers v6
            const provider = new ethers.BrowserProvider(window.ethereum);
            const signer = await provider.getSigner();
            const contract = new ethers.Contract(CROWDSALE_ADDRESS, contractABI, signer);

            // Конвертируем введенный ETH в Wei (например, 0.005 -> 5000000000000000)
            const valueInWei = ethers.parseEther(ethAmountInput);

            statusDiv.innerText = "Подтвердите покупку в окне MetaMask...";

            // 4. Вызываем buyTokens и передаем адрес игры
            const tx = await contract.buyTokens(gameReceiver, { value: valueInWei });
            
            statusDiv.innerText = "Транзакция отправлена! Ожидание Blockscout...";
            console.log("Tx Hash:", tx.hash);

            // Ожидаем завершения транзакции
            await tx.wait();

            statusDiv.style.color = "#4caf50";
            statusDiv.innerText = "Успешно! Токены отправлены на ваш игровой аккаунт.";

        } catch (error) {
            console.error(error);
            statusDiv.style.color = "#ff5722";
            statusDiv.innerText = "Ошибка: " + (error.reason || error.message || "Отказ от транзакции");
        } finally {
            payBtn.disabled = false;
        }
    }
</script>




</body>
</html>
