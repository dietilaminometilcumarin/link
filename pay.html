<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buying a Quantum token QTM</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121214;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .pay-card {
            background-color: #1a1a1e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid #2a2a30;
        }
        h2 { margin-top: 0; color: #f3f3f3; }
        .info { color: #aaa; font-size: 14px; margin-bottom: 20px; word-break: break-all; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #ccc; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #3a3a42;
            background-color: #0a0a0c;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus { border-color: #f6851b; outline: none; }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background-color: #f6851b; 
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #e27613; }
        button:disabled { background-color: #4a4a52; cursor: not-allowed; }
        .status { margin-top: 15px; font-size: 14px; color: #ffeb3b; }
    </style>
</head>
<body>

<div class="pay-card">
    <h2>Purchasing tokens QTM</h2>
    <p class="info">Destination wallet :<br><strong id="receiver-address">Loading...</strong></p>
    
    <div class="input-group">
        <label for="eth-amount">Amount to be paid(ETH):</label>
        <input type="number" id="eth-amount" step="0.0001" min="0.0001" placeholder="Example, 0.005" value="0.005">
    </div>

    <button id="pay-btn" onclick="startPayment()">Buy tokens</button>
    <div id="status-text" class="status"></div>
</div>

<script>
    const ARBITRUM_CHAIN_ID_HEX = '0x66eee'; // 42161 in HEX for Arbitrum One (0xa4b1). (For Sepolia test, specify '0x66eee')
    const CROWDSALE_ADDRESS = "0xE57Edc0F47234C287A3973E4450B0e890E97f129"; 
    
    const contractABI = [
        "function buyTokens(address _receiver) public payable"
    ];

    // Extract the game wallet address from the URL parameters (?receiver=0x...)
    const urlParams = new URLSearchParams(window.location.search);
    const gameReceiver = urlParams.get('receiver'); 

    // Displaying the player's address on the screen
    if (gameReceiver) {
        document.getElementById('receiver-address').innerText = gameReceiver;
    } else {
        document.getElementById('receiver-address').innerText = "Error: Wallet address not passed";
        document.getElementById('pay-btn').disabled = true;
    }

    async function startPayment() {
        const statusDiv = document.getElementById('status-text');
        const payBtn = document.getElementById('pay-btn');
        const ethAmountInput = document.getElementById('eth-amount').value;

        // Checking the input validity
        if (!ethAmountInput || parseFloat(ethAmountInput) <= 0) {
            statusDiv.innerText = "Please enter a valid ETH amount.";
            return;
        }

        if (typeof window.ethereum === 'undefined') {
            statusDiv.innerText = "Please open this page through the MetaMask browser.";
            return;
        }

        try {
            payBtn.disabled = true;
            statusDiv.innerText = "Connecting to the wallet...";

            // 1. Requesting access to the buyer's MetaMask account
            await window.ethereum.request({ method: 'eth_requestAccounts' });
            
            statusDiv.innerText = "Проверка сети Arbitrum...";

            // 2. We're trying to force the wallet to switch to the Arbitrum One network.
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: ARBITRUM_CHAIN_ID_HEX }],
                });
            } catch (switchError) {
                // Error 4902 means the Arbitrum network isn't in MetaMask. Let's add it.
                if (switchError.code === 4902) {
                    statusDiv.innerText = "Adding the Arbitrum network to your MetaMask...";
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: ARBITRUM_CHAIN_ID_HEX,
                            chainName: 'Arbitrum One testnet',
                            nativeCurrency: { name: 'Ether', symbol: 'ETH', decimals: 18 },
                            rpcUrls: ['https://arbitrum-sepolia.drpc.org'],
                            blockExplorerUrls: ['https://arbitrum-sepolia.blockscout.com/']
                        }],
                    });
                } else {
                    throw switchError;
                }
            }

            statusDiv.innerText = "Preparing a transaction...";

            // 3. Initializing Ethers.js (v6 syntax)
            const provider = new ethers.BrowserProvider(window.ethereum);
            const signer = await provider.getSigner();
            const contract = new ethers.Contract(CROWDSALE_ADDRESS, contractABI, signer);

            // We convert the amount entered by the user into Wei format
            const valueInWei = ethers.parseEther(ethAmountInput);

            statusDiv.innerText = "Confirm the transaction in MetaMask...";

            // 4. Calling a smart contract
            const tx = await contract.buyTokens(gameReceiver, { value: valueInWei });
            
            statusDiv.innerText = "The transaction has been sent to the blockchain. Waiting for network approval....";
            console.log("Tx Hash:", tx.hash);

            // We are waiting for the transaction to be confirmed on the Arbitrum network.
            await tx.wait();

            statusDiv.style.color = "#4caf50"; 
            statusDiv.innerText = "Success! Tokens have been credited to your game account..";

        } catch (error) {
            console.error(error);
            statusDiv.style.color = "#ff5722"; 
            statusDiv.innerText = "Error: " + (error.reason || error.message || "Transaction refused");
        } finally {
            payBtn.disabled = false;
        }
    }
</script>

</body>
</html>
