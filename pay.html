<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата внутриигровых токенов BTN</title>
    <!-- Подключаем актуальную версию библиотеки Ethers.js через CDN -->
    <script src="https://cloudflare.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121214;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .pay-card {
            background-color: #1a1a1e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid #2a2a30;
        }
        h2 { margin-top: 0; color: #f3f3f3; }
        .info { color: #aaa; font-size: 14px; margin-bottom: 20px; word-break: break-all; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #ccc; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #3a3a42;
            background-color: #0a0a0c;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus { border-color: #f6851b; outline: none; }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background-color: #f6851b; /* Фирменный цвет MetaMask */
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #e27613; }
        button:disabled { background-color: #4a4a52; cursor: not-allowed; }
        .status { margin-top: 15px; font-size: 14px; color: #ffeb3b; }
    </style>
</head>
<body>

<div class="pay-card">
    <h2>Покупка токенов BTN</h2>
    <p class="info">Игровой аккаунт получателя:<br><strong id="receiver-address">Загрузка...</strong></p>
    
    <div class="input-group">
        <label for="eth-amount">Сумма к оплате (в ETH):</label>
        <input type="number" id="eth-amount" step="0.0001" min="0.0001" placeholder="Например, 0.005" value="0.005">
    </div>

    <button id="pay-btn" onclick="startPayment()">Купить токены</button>
    <div id="status-text" class="status"></div>
</div>

<script>
    // НАСТРОЙКИ СЕТИ И КОНТРАКТА (Вы можете менять их без обновления приложения)
    const ARBITRUM_CHAIN_ID_HEX = '0xa4b1'; // 42161 в HEX для Arbitrum One (Для теста Sepolia укажите '0x66eee')
    const CROWDSALE_ADDRESS = "0xaf013b2743c6C57784e2D6E5678CF3326cA83956"; // Ваш адрес краудсейла
    
    // ABI вашей функции buyTokens(address)
    const contractABI = [
        "function buyTokens(address _receiver) public payable"
    ];

    // Извлекаем адрес игрового кошелька из параметров URL (?receiver=0x...)
    const urlParams = new URLSearchParams(window.location.search);
    const gameReceiver = urlParams.get('receiver'); 

    // Отображаем адрес игрока на экране
    if (gameReceiver) {
        document.getElementById('receiver-address').innerText = gameReceiver;
    } else {
        document.getElementById('receiver-address').innerText = "Ошибка: адрес игры не передан";
        document.getElementById('pay-btn').disabled = true;
    }

    async function startPayment() {
        const statusDiv = document.getElementById('status-text');
        const payBtn = document.getElementById('pay-btn');
        const ethAmountInput = document.getElementById('eth-amount').value;

        // Проверяем валидность ввода
        if (!ethAmountInput || parseFloat(ethAmountInput) <= 0) {
            statusDiv.innerText = "Пожалуйста, введите корректную сумму ETH.";
            return;
        }

        if (typeof window.ethereum === 'undefined') {
            statusDiv.innerText = "Пожалуйста, откройте эту страницу через браузер MetaMask.";
            return;
        }

        try {
            payBtn.disabled = true;
            statusDiv.innerText = "Подключение к кошельку...";

            // 1. Запрашиваем доступ к аккаунту MetaMask покупателя
            await window.ethereum.request({ method: 'eth_requestAccounts' });
            
            statusDiv.innerText = "Проверка сети Arbitrum...";

            // 2. Пытаемся принудительно переключить кошелек на сеть Arbitrum One
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: ARBITRUM_CHAIN_ID_HEX }],
                });
            } catch (switchError) {
                // Ошибка 4902 означает, что сети Arbitrum нет в MetaMask. Добавляем её.
                if (switchError.code === 4902) {
                    statusDiv.innerText = "Добавление сети Arbitrum в ваш MetaMask...";
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: ARBITRUM_CHAIN_ID_HEX,
                            chainName: 'Arbitrum One',
                            nativeCurrency: { name: 'Ether', symbol: 'ETH', decimals: 18 },
                            rpcUrls: ['https://arbitrum.io'],
                            blockExplorerUrls: ['https://arbiscan.io']
                        }],
                    });
                } else {
                    throw switchError;
                }
            }

            statusDiv.innerText = "Подготовка транзакции...";

            // 3. Инициализируем Ethers.js (v6 синтаксис)
            const provider = new ethers.BrowserProvider(window.ethereum);
            const signer = await provider.getSigner();
            const contract = new ethers.Contract(CROWDSALE_ADDRESS, contractABI, signer);

            // Переводим введенную пользователем сумму в формат Wei
            const valueInWei = ethers.parseEther(ethAmountInput);

            statusDiv.innerText = "Подтвердите транзакцию в MetaMask...";

            // 4. Вызываем смарт-контракт
            const tx = await contract.buyTokens(gameReceiver, { value: valueInWei });
            
            statusDiv.innerText = "Транзакция отправлена в блокчейн. Ожидание сети...";
            console.log("Tx Hash:", tx.hash);

            // Ожидаем подтверждения транзакции в сети Arbitrum
            await tx.wait();

            statusDiv.style.color = "#4caf50"; // Зеленый цвет успеха
            statusDiv.innerText = "Успешно! Токены зачислены на игровой аккаунт.";

        } catch (error) {
            console.error(error);
            statusDiv.style.color = "#ff5722"; // Красный цвет ошибки
            statusDiv.innerText = "Ошибка: " + (error.reason || error.message || "Отказ от транзакции");
        } finally {
            payBtn.disabled = false;
        }
    }
</script>

</body>
</html>
